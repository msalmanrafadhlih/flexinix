name: Push Binaries

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                system: [x86_64-linux, aarch64-linux]

        steps:
            - uses: actions/checkout@v4

            - uses: cachix/install-nix-action@v25
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - uses: cachix/cachix-action@v14
              with:
                  name: racoonfig
                  authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

            # 🔥 WAJIB: biar semua hasil build ke-push
            - run: cachix watch-store racoonfig &

            # Optional debug
            - run: nix flake show

            # 🔥 BUILD SEMUA PACKAGES PER SYSTEM
            - run: nix build .#packages.${{ matrix.system }} --print-build-logs
